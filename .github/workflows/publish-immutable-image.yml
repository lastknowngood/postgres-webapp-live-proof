name: publish-immutable-image

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to publish as immutable image
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres_webapp_live_proof
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres_webapp_live_proof"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      IMAGE_NAME: ghcr.io/lastknowngood/postgres-webapp-live-proof
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54329/postgres_webapp_live_proof
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Derive immutable tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          full_sha="$(git rev-parse HEAD)"
          echo "full_sha=${full_sha}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${full_sha}" >> "$GITHUB_OUTPUT"

      - name: Sync dependencies
        run: uv sync --frozen --group dev

      - name: Run repo-native QA
        shell: bash
        run: |
          set -euo pipefail
          uv run ruff check .
          uv run pyright
          uv run pytest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assert immutable tag does not already exist
        shell: bash
        run: |
          set -euo pipefail
          if docker buildx imagetools inspect "${IMAGE_NAME}:${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Immutable tag already exists: ${IMAGE_NAME}:${{ steps.meta.outputs.tag }}" >&2
            exit 1
          fi

      - name: Build local smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            --build-arg APP_BUILD_REVISION="${{ steps.meta.outputs.full_sha }}" \
            --label "org.opencontainers.image.source=https://github.com/lastknowngood/postgres-webapp-live-proof" \
            --label "org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}" \
            --tag postgres-webapp-live-proof:smoke .

      - name: Run built-image smoke
        shell: bash
        run: |
          set -euo pipefail
          network="proof-smoke-net"
          db_container="proof-smoke-db"
          app_container="proof-smoke-app"
          app_override_container="proof-smoke-app-override"
          docker network create "${network}"
          cleanup() {
            docker rm -f "${app_override_container}" "${app_container}" "${db_container}" >/dev/null 2>&1 || true
            docker network rm "${network}" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run -d --name "${db_container}" --network "${network}" \
            -e POSTGRES_DB=postgres_webapp_live_proof \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            postgres:16-alpine >/dev/null
          for _ in $(seq 1 30); do
            if docker exec "${db_container}" pg_isready -U postgres -d postgres_webapp_live_proof >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker run -d --name "${app_container}" --network "${network}" -p 18080:8000 \
            -e DATABASE_URL=postgresql://postgres:postgres@${db_container}:5432/postgres_webapp_live_proof \
            postgres-webapp-live-proof:smoke >/dev/null
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz >/tmp/healthz.json; then
              break
            fi
            sleep 1
          done
          python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('/tmp/healthz.json').read_text(encoding='utf-8'))
assert payload['status'] == 'ok', payload
assert payload['build_revision'] == '${{ steps.meta.outputs.full_sha }}', payload
PY
          docker rm -f "${app_container}" >/dev/null
          docker run -d --name "${app_override_container}" --network "${network}" -p 18081:8000 \
            -e DATABASE_URL=postgresql://postgres:postgres@${db_container}:5432/postgres_webapp_live_proof \
            -e APP_BUILD_REVISION=spoofed \
            postgres-webapp-live-proof:smoke >/dev/null
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18081/healthz >/tmp/healthz-override.json; then
              break
            fi
            sleep 1
          done
          python - <<'PY'
import json
from pathlib import Path
payload = json.loads(Path('/tmp/healthz-override.json').read_text(encoding='utf-8'))
assert payload['build_revision'] == '${{ steps.meta.outputs.full_sha }}', payload
PY

      - name: Push immutable image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            APP_BUILD_REVISION=${{ steps.meta.outputs.full_sha }}
          tags: ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/lastknowngood/postgres-webapp-live-proof
            org.opencontainers.image.revision=${{ steps.meta.outputs.full_sha }}

      - name: Write publish summary
        shell: bash
        run: |
          {
            echo "## Immutable image publish"
            echo
            echo "- ref: \`${{ inputs.git_ref }}\`"
            echo "- full_sha: \`${{ steps.meta.outputs.full_sha }}\`"
            echo "- tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- digest: \`${{ steps.push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
